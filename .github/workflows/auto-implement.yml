name: Claude Code自動更新対応

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: auto-implement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-implement:
    # claude-code-updateまたはplugin-updateラベルが付いたissueに反応
    if: github.event.label.name == 'claude-code-update' || github.event.label.name == 'plugin-update'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: ラベル付与者の権限チェック
        run: |
          echo "ラベル付与者: ${SENDER}"

          # OWNERまたは信頼できるボットのみ許可
          TRUSTED_BOTS=("github-actions[bot]" "dependabot[bot]" "claude[bot]")

          # ボット判定
          for BOT in "${TRUSTED_BOTS[@]}"; do
            if [ "${SENDER}" = "${BOT}" ]; then
              echo "✓ 信頼できるボット: ${SENDER}"
              exit 0
            fi
          done

          # リポジトリオーナー判定（GitHub APIで確認）
          PERMISSION=$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${SENDER}/permission" --jq '.permission' 2>/dev/null || echo "none")
          echo "権限レベル: ${PERMISSION}"

          if [ "${PERMISSION}" = "admin" ]; then
            echo "✓ リポジトリオーナー: ${SENDER}"
            exit 0
          fi

          echo "::error::ラベル付与者 ${SENDER} にはオーナー権限がありません（権限: ${PERMISSION}）"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENDER: ${{ github.event.sender.login }}

      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: pre-commitをセットアップ
        run: |
          pip install pre-commit
          pre-commit install

      - name: シークレット検証
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN が設定されていません"
            exit 1
          fi
          echo "✓ 必要なシークレットが設定されています"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: ラベルに基づく設定を決定
        id: config
        run: |
          if [ "$LABEL_NAME" = "claude-code-update" ]; then
            echo "branch_prefix=auto/claude-code-update" >> $GITHUB_OUTPUT
            echo "pr_label=documentation" >> $GITHUB_OUTPUT
            echo "target_type=docs" >> $GITHUB_OUTPUT
          elif [ "$LABEL_NAME" = "plugin-update" ]; then
            echo "branch_prefix=auto/plugin-update" >> $GITHUB_OUTPUT
            echo "pr_label=plugin" >> $GITHUB_OUTPUT
            echo "target_type=plugin" >> $GITHUB_OUTPUT
          fi

          echo "ラベル: $LABEL_NAME"
        env:
          LABEL_NAME: ${{ github.event.label.name }}

      - name: 作業ブランチを作成
        id: branch
        run: |
          BRANCH_NAME="${BRANCH_PREFIX}-issue-${ISSUE_NUM}"
          echo "name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          # ローカルブランチが既に存在する場合は削除
          if git rev-parse --verify "${BRANCH_NAME}" >/dev/null 2>&1; then
            echo "既存ローカルブランチを削除します: ${BRANCH_NAME}"
            git branch -D "${BRANCH_NAME}" || true
          fi

          git checkout -b "${BRANCH_NAME}"
          echo "作業ブランチを作成しました: ${BRANCH_NAME}"
        env:
          BRANCH_PREFIX: ${{ steps.config.outputs.branch_prefix }}
          ISSUE_NUM: ${{ github.event.issue.number }}

      - name: Issueの内容を取得
        id: issue
        run: |
          # Issue本文をファイルに保存
          gh issue view "${ISSUE_NUM}" --json title,body --jq '.body' > issue-body.md
          gh issue view "${ISSUE_NUM}" --json title --jq '.title' > issue-title.txt
          # タイトルをoutputにも保存（後のステップで使用）
          echo "title=$(cat issue-title.txt | tr -d '\n')" >> $GITHUB_OUTPUT
          echo "取得完了: Issue #${ISSUE_NUM}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}

      - name: Claudeで実装を実行（claude-code-update）
        if: github.event.label.name == 'claude-code-update'
        id: claude-implement-docs
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: 'claude'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            あなたはClaude Codeマーケットプレイスのソフトウェアエンジニアです。

            ## タスク
            Issue #${{ github.event.issue.number }} の内容に基づいて、必要な実装を行ってください。

            ## Issue情報
            - タイトル: (issue-title.txtを参照)
            - 本文: (issue-body.mdを参照)

            ## 実行手順

            1. issue-title.txtとissue-body.mdを読んで、Issueの内容を把握
            2. CLAUDE.mdを読んで、プロジェクトのガイドラインを把握
            3. .claude/rules/README.md を読んで、ドキュメント構造の全体像を把握
            4. 必要に応じて .claude/rules/ 配下の関連ドキュメントを読む
            5. scripts/validators/ 配下のバリデーターを確認（__init__.py でエクスポート一覧を確認）
            6. 必要な変更を特定し、以下を実装:
               a. ドキュメント更新（.claude/rules/*.md）
               b. バリデーター更新（scripts/validators/*.py）
               c. テスト更新（scripts/tests/*.py）
            7. 実装完了後、pre-commitを実行してlint/formatエラーをチェック
               - `pre-commit run --all-files` を実行
               - エラーがあれば内容を確認し、該当ファイルを修正
               - 再度pre-commitを実行し、すべてパスするまで繰り返す
            8. すべてのチェックがパスしたら、変更内容のサマリーを /tmp/change-summary.txt に書き出す
               - 変更したファイル一覧と各ファイルの変更概要を箇条書きで記載
               - 例: "- .claude/rules/README.md: 用語集にPRFAQ、DDDを追加"

            ## プロジェクト構造
            - CLAUDE.md: プロジェクトのガイドライン（必読）
            - .claude/rules/: プラグイン仕様ドキュメント（README.mdに索引あり）
            - scripts/validators/: バリデーター実装
            - scripts/tests/: テストコード

            ## 重要
            - CLAUDE.mdのガイドラインに従う
            - 既存のコードスタイルを維持
            - 新機能を追加する場合は対応するテストも追加
            - 破壊的変更がある場合は明確にコメントを残す
            - 不明確な部分は「TODO: 要確認」としてマーク
            - リポジトリに永続的に必要なファイルのみ作成・変更すること
            - issue-body.md, issue-title.txt などの一時ファイルは参照のみで、変更やコミットに含めないこと

          # ラベルは手動付与のため、Edit/Writeのパス制限は不要
          # Bashは全コマンド許可（ラベルは手動付与なので信頼できる）
          claude_args: '--max-turns 50 --allowed-tools "Read,Grep,Glob,Edit,Write,Bash(*)"'

      - name: Claudeで実装を実行（plugin-update）
        if: github.event.label.name == 'plugin-update'
        id: claude-implement-plugin
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: 'claude'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            あなたはClaude Codeマーケットプレイスのソフトウェアエンジニアです。

            ## タスク
            Issue #${{ github.event.issue.number }} の改善提案に基づいて、プラグインを更新してください。

            ## Issue情報
            - タイトル: (issue-title.txtを参照)
            - 本文: (issue-body.mdを参照)

            ## 実行手順

            1. issue-title.txtとissue-body.mdを読んで、改善提案の内容を把握
            2. CLAUDE.mdを読んで、プロジェクトのガイドラインを把握
            3. .claude/rules/ 配下の関連ルールドキュメントを確認
            4. 対象プラグインのファイルを確認:
               - plugin.json（.claude-plugin/plugin.json）
               - 各サブディレクトリ配下のコンポーネントファイル
            5. Issueに記載された改善内容を実装
            6. 実装完了後、pre-commitを実行してlint/formatエラーをチェック
               - `pre-commit run --all-files` を実行
               - エラーがあれば内容を確認し、該当ファイルを修正
               - 再度pre-commitを実行し、すべてパスするまで繰り返す
            7. すべてのチェックがパスしたら、変更内容のサマリーを /tmp/change-summary.txt に書き出す
               - 変更したファイル一覧と各ファイルの変更概要を箇条書きで記載
               - 例: "- plugins/my-plugin/commands/review.md: レビュー観点を追加"

            ## プロジェクト構造
            - CLAUDE.md: プロジェクトのガイドライン（必読）
            - .claude/rules/: プラグイン仕様ドキュメント（README.mdに索引あり）
            - plugins/: プラグインディレクトリ

            ## 重要
            - CLAUDE.mdのガイドラインに従う
            - Issueの改善提案に忠実に実装する
            - 既存の動作を壊さないよう注意
            - リポジトリに永続的に必要なファイルのみ作成・変更すること
            - issue-body.md, issue-title.txt などの一時ファイルは参照のみで、変更やコミットに含めないこと

          # yamllint disable-line rule:line-length
          claude_args: '--max-turns 50 --allowed-tools "Read,Grep,Glob,Edit,Write,Bash(uvx *),Bash(python3 scripts/*),Bash(npx *),Bash(pre-commit run*)"'

      - name: 変更があるか確認
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "変更なし"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "変更あり"
            git diff --stat
          fi

      - name: pre-commitで最終検証
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          echo "=== 最終検証: pre-commit実行 ==="
          # 一時ファイルを除外してステージング
          rm -f issue-body.md issue-title.txt
          git add -A

          # pre-commit実行（自動修正があれば適用）
          if ! pre-commit run --all-files; then
            echo "自動修正が適用されました。再度ステージングして検証します。"
            git add -A
            # 2回目の実行
            if ! pre-commit run --all-files; then
              echo "::error::pre-commitチェックに失敗しました。Claude Codeによる自動修正が不完全です。"
              git status
              git diff
              exit 1
            fi
          fi
          echo "✓ すべてのpre-commitチェックがパスしました"

      - name: 変更をコミットしてプッシュ
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          set -e
          # 一時ファイルを削除（コミットに含めないため）
          rm -f issue-body.md issue-title.txt
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A

          # ラベルに応じてコミットメッセージを変更
          if [ "$LABEL_NAME" = "claude-code-update" ]; then
            COMMIT_DESC="Claude Codeのアップデートに伴うドキュメント・バリデーター更新"
          else
            COMMIT_DESC="ルール更新に伴うプラグイン改善"
          fi

          git commit -m "feat: Issue #${ISSUE_NUM} の自動実装

          ${COMMIT_DESC}

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>"

          # デバッグ情報を出力
          echo "=== デバッグ情報 ==="
          echo "ブランチ名: ${BRANCH_NAME}"
          git remote -v
          echo "==================="

          # 明示的にトークンを使用してリモートURLを設定
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # 前回の実行でブランチが残っている場合があるためforce push
          if ! git push -u --force origin "${BRANCH_NAME}"; then
            echo "::error::git push に失敗しました"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_NUM: ${{ github.event.issue.number }}

      - name: ラベルが存在しない場合は作成
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          # PRに付与するラベルが存在するか確認し、なければ作成
          for LABEL in "$LABEL_NAME" "$PR_LABEL"; do
            if ! gh label list --json name --jq '.[].name' | grep -q "^${LABEL}$"; then
              echo "ラベル '${LABEL}' が存在しないため作成します"
              gh label create "${LABEL}" --description "自動生成されたラベル" || true
            else
              echo "ラベル '${LABEL}' は既に存在します"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_LABEL: ${{ steps.config.outputs.pr_label }}

      - name: PRを作成
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          # ISSUE_TITLEはenv経由で安全に渡される
          # Issueタイトルが空の場合のフォールバック
          if [ -z "$ISSUE_TITLE" ]; then
            PR_TITLE="feat: Issue #${ISSUE_NUM} の自動実装"
          # [CHANGELOG vX.X.X] 形式の場合はそのまま使用
          elif [[ "$ISSUE_TITLE" =~ ^\[CHANGELOG\ v[0-9]+\.[0-9]+\.[0-9]+\] ]]; then
            PR_TITLE="$ISSUE_TITLE"
          # [プラグイン改善] 形式の場合はそのまま使用
          elif [[ "$ISSUE_TITLE" =~ ^\[プラグイン改善\] ]]; then
            PR_TITLE="$ISSUE_TITLE"
          else
            PR_TITLE="feat: $ISSUE_TITLE"
          fi

          # Claude Codeが出力した変更サマリーファイルを読み込む
          if [ -f "/tmp/change-summary.txt" ]; then
            CHANGE_SUMMARY=$(cat /tmp/change-summary.txt)
          else
            CHANGE_SUMMARY=""
          fi

          # 変更サマリーが空の場合のフォールバック
          if [ -z "$CHANGE_SUMMARY" ]; then
            CHANGE_SUMMARY="Claude Actionによって自動生成された変更です。詳細はコミット履歴を参照してください。"
          fi

          # PR本文をファイルに書き込む（シェルエスケープの問題を回避）
          if [ "$LABEL_NAME" = "claude-code-update" ]; then
            {
              echo "## 概要"
              echo "Issue #${ISSUE_NUM}: ${ISSUE_TITLE}"
              echo ""
              echo "Claude Codeのアップデートに対応します。"
              echo ""
              echo "## 関連Issue"
              echo "Closes #${ISSUE_NUM}"
              echo ""
              echo "## 変更内容"
              echo "$CHANGE_SUMMARY"
              echo ""
              echo "## 確認事項"
              echo "- [ ] ドキュメントの変更が適切か"
              echo "- [ ] バリデーターが正しく動作するか"
              echo "- [ ] テストが通過するか"
              echo ""
              echo "---"
              echo "🤖 Generated with [Claude Code](https://claude.com/claude-code)"
            } > /tmp/pr-body.md
          else
            {
              echo "## 概要"
              echo "Issue #${ISSUE_NUM}: ${ISSUE_TITLE}"
              echo ""
              echo "プラグイン改善提案を実装します。"
              echo ""
              echo "## 関連Issue"
              echo "Closes #${ISSUE_NUM}"
              echo ""
              echo "## 変更内容"
              echo "$CHANGE_SUMMARY"
              echo ""
              echo "## 確認事項"
              echo "- [ ] プラグインの変更が適切か"
              echo "- [ ] 既存の動作に影響がないか"
              echo ""
              echo "---"
              echo "🤖 Generated with [Claude Code](https://claude.com/claude-code)"
            } > /tmp/pr-body.md
          fi

          gh pr create \
            --title "$PR_TITLE" \
            --body-file /tmp/pr-body.md \
            --label "$LABEL_NAME" \
            --label "$PR_LABEL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_LABEL: ${{ steps.config.outputs.pr_label }}

      - name: Issueにコメントを追加（変更あり）
        if: steps.check-changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: |
          gh issue comment "${ISSUE_NUM}" --body "🤖 **自動実装完了**

          PRを作成しました。レビューをお願いします。

          ---
          *このコメントはClaude Code自動更新対応ワークフローによって生成されました*"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}

      - name: Issueにコメントを追加（変更なし）
        if: steps.check-changes.outputs.has_changes == 'false'
        continue-on-error: true
        run: |
          gh issue comment "${ISSUE_NUM}" --body "🤖 **自動実装結果**

          Issueの内容を分析しましたが、自動で実装可能な変更は見つかりませんでした。
          手動での対応が必要な可能性があります。

          ---
          *このコメントはClaude Code自動更新対応ワークフローによって生成されました*"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
