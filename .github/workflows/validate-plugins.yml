name: プラグイン検証

on:
  pull_request:
    paths:
      - 'plugins/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pythonをセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 変更されたプラグインファイルを取得
        id: changed-files
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # 手動実行: 全ファイルを対象
            FILES=$(find plugins -type f \( -name '*.md' -o -name '*.json' \) 2>/dev/null | tr '\n' ' ')
          else
            # PR: baseブランチとの差分
            FILES=$(git diff --name-only --diff-filter=d "$BASE_SHA" "$HEAD_SHA" -- 'plugins/**' \
              | grep -E '\.(md|json)$' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: プラグインを検証
        if: steps.changed-files.outputs.files != ''
        run: |
          echo "検証対象ファイル: ${CHANGED_FILES}"
          python scripts/validate_plugin.py ${CHANGED_FILES}
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
